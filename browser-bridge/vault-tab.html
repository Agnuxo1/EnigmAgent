<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EnigmAgent Vault (extension)</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'none'">
  <style>
    body { margin: 0; padding: 20px; background: #0f1116; color: #e7e9ee;
      font: 14px/1.5 -apple-system, Segoe UI, sans-serif; }
    .note { background: #171a21; border: 1px solid #2a2f3a; padding: 16px;
      border-radius: 10px; max-width: 640px; margin: 20px auto; }
    a { color: #5aa0ff; }
    code { background: #1f232c; padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="note">
    <h2>EnigmAgent vault — extension mode</h2>
    <p>This is the extension-bundled vault tab. For the MVP, open the standalone
       vault-app instead: <code>vault-app/index.html</code>.</p>
    <p>v2 will host the full vault UI inside this page so it can communicate with
       the service worker directly via <code>chrome.runtime</code>.</p>
    <p><a href="https://github.com/agnuxo1/EnigmAgent" target="_blank" rel="noopener">Project on GitHub</a></p>
  </div>

  <script src="vault-tab.js"></script>
</body>
</html>
