<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EnigmAgent — crypto round-trip test</title>
  <style>
    body { font: 13px/1.5 ui-monospace, Menlo, Consolas, monospace;
      background: #0f1116; color: #e7e9ee; max-width: 760px;
      margin: 30px auto; padding: 20px; }
    h1 { font-family: -apple-system, Segoe UI, sans-serif; }
    .pass { color: #7bd389; }
    .fail { color: #f06464; }
    .row { margin: 6px 0; }
    button { padding: 8px 14px; background: #5aa0ff; color: #0a0d12;
      border: none; border-radius: 6px; font-weight: 600; cursor: pointer;
      font-family: inherit; }
  </style>
</head>
<body>
  <h1>Crypto round-trip</h1>
  <p>Verifies that the vault's AES-256-GCM + PBKDF2-SHA-256 path can
     encrypt, decrypt, and reject tampered ciphertext and wrong passwords.</p>
  <button id="run">Run tests</button>
  <div id="log"></div>

  <script>
    const enc = new TextEncoder();
    const dec = new TextDecoder();

    const b64 = {
      enc: (buf) => btoa(String.fromCharCode(...new Uint8Array(buf))),
      dec: (s) => {
        const bin = atob(s);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out;
      },
    };

    async function deriveKey(password, username, saltBytes) {
      const userSalt = await crypto.subtle.digest('SHA-256', enc.encode(username || ''));
      const mixed = new Uint8Array(saltBytes.length + userSalt.byteLength);
      mixed.set(saltBytes, 0);
      mixed.set(new Uint8Array(userSalt), saltBytes.length);
      const baseKey = await crypto.subtle.importKey(
        'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt: mixed, iterations: 600000 },
        baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    }

    async function encrypt(key, pt) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(pt));
      return { iv: b64.enc(iv), ct: b64.enc(ct) };
    }

    async function decrypt(key, iv, ct) {
      const pt = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64.dec(iv) }, key, b64.dec(ct));
      return dec.decode(pt);
    }

    const log = document.getElementById('log');
    function report(name, ok, extra = '') {
      const div = document.createElement('div');
      div.className = 'row ' + (ok ? 'pass' : 'fail');
      div.textContent = (ok ? '✓ ' : '✗ ') + name + (extra ? ' — ' + extra : '');
      log.appendChild(div);
      return ok;
    }

    document.getElementById('run').addEventListener('click', async () => {
      log.innerHTML = '';
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const user = 'alice';
      const pass = 'correct horse battery staple';
      const plaintext = 'ghp_abcdefg_not_a_real_token_123456789';

      let allPass = true;

      try {
        const key = await deriveKey(pass, user, salt);
        const { iv, ct } = await encrypt(key, plaintext);
        const back = await decrypt(key, iv, ct);
        allPass &= report('round-trip encrypt/decrypt', back === plaintext,
          back === plaintext ? `${plaintext.length} bytes` : 'got: ' + back);
      } catch (e) { allPass &= report('round-trip', false, e.message); }

      // Wrong password → should throw
      try {
        const key = await deriveKey(pass, user, salt);
        const { iv, ct } = await encrypt(key, plaintext);
        const wrong = await deriveKey('nope', user, salt);
        let threw = false;
        try { await decrypt(wrong, iv, ct); } catch { threw = true; }
        allPass &= report('wrong password is rejected', threw);
      } catch (e) { allPass &= report('wrong password', false, e.message); }

      // Tampered ciphertext → should throw (GCM auth tag)
      try {
        const key = await deriveKey(pass, user, salt);
        const { iv, ct } = await encrypt(key, plaintext);
        const bad = b64.dec(ct); bad[0] ^= 0x01;
        let threw = false;
        try { await decrypt(key, iv, b64.enc(bad)); } catch { threw = true; }
        allPass &= report('tampered ciphertext is rejected', threw);
      } catch (e) { allPass &= report('tamper check', false, e.message); }

      // Different username, same password → different key
      try {
        const k1 = await deriveKey(pass, 'alice', salt);
        const k2 = await deriveKey(pass, 'bob', salt);
        const { iv, ct } = await encrypt(k1, plaintext);
        let threw = false;
        try { await decrypt(k2, iv, ct); } catch { threw = true; }
        allPass &= report('username is mixed into key derivation', threw);
      } catch (e) { allPass &= report('username mix', false, e.message); }

      const summary = document.createElement('h2');
      summary.className = allPass ? 'pass' : 'fail';
      summary.textContent = allPass ? 'ALL PASS' : 'FAILURES — investigate';
      log.appendChild(summary);
    });
  </script>
</body>
</html>
