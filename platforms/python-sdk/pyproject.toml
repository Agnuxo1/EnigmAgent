[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "enigmagent"
version = "1.0.0"
description = "EnigmAgent Python SDK — secure vault integration for AI agent frameworks"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "EnigmAgent", email = "dev@enigmagent.com" }]
keywords = [
    "enigmagent", "vault", "secrets", "ai", "agents",
    "langchain", "crewai", "autogen", "llamaindex",
    "haystack", "semantic-kernel", "smolagents",
    "phidata", "agno", "mem0", "langgraph",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
requires-python = ">=3.9"
dependencies = []  # zero mandatory dependencies — stdlib only

[project.optional-dependencies]
langchain      = ["langchain-core>=0.1.0"]
crewai         = ["crewai>=0.1.0"]
autogen        = ["pyautogen>=0.2.0"]
llamaindex     = ["llama-index-core>=0.10.0"]
haystack       = ["haystack-ai>=2.0.0"]
semantic-kernel = ["semantic-kernel>=1.0.0"]
smolagents     = ["smolagents>=1.0.0"]
phidata        = ["phidata>=2.0.0"]
agno           = ["agno>=1.0.0"]
mem0           = ["mem0ai>=0.1.0"]
langgraph      = ["langgraph>=0.1.0", "langchain-core>=0.1.0"]
openai-agents  = ["openai-agents>=0.1.0"]
anthropic      = ["anthropic>=0.20.0"]

# Install ALL framework integrations at once
all = [
    "langchain-core>=0.1.0",
    "crewai>=0.1.0",
    "pyautogen>=0.2.0",
    "llama-index-core>=0.10.0",
    "haystack-ai>=2.0.0",
    "semantic-kernel>=1.0.0",
    "smolagents>=1.0.0",
    "phidata>=2.0.0",
    "mem0ai>=0.1.0",
    "langgraph>=0.1.0",
    "anthropic>=0.20.0",
]

[project.urls]
Homepage       = "https://enigmagent.com"
Documentation  = "https://docs.enigmagent.com/sdk/python"
Repository     = "https://github.com/enigmagent/enigmagent"
"Bug Tracker"  = "https://github.com/enigmagent/enigmagent/issues"

[tool.hatch.build.targets.wheel]
packages = ["enigmagent"]

[tool.hatch.build.targets.sdist]
include = [
    "enigmagent/",
    "tests/",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
